<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Corporate Janta Party — A movement, eventually.</title>
  <meta name="description" content="A satirical political party for India's corporate aam aadmi. Manifesto, manifestoes, and membership cards." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400;1,500;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   CORPORATE JANTA PARTY — editorial newsprint stylesheet
   Palette: cream paper, dark cocoa ink, saffron accent, red bulletin
   Type: Playfair Display (serif headings, italics), Inter (body), JetBrains Mono (labels)
   ============================================================ */

:root {
  --cream: #f4ede0;
  --cream-2: #ebe1cf;
  --paper: #faf6ec;
  --ink: #221c14;
  --ink-2: #3a2f22;
  --cocoa: #2a221a;
  --saffron: #e2731f;
  --saffron-2: #c8601a;
  --red: #b62a1c;
  --green: #2c5e3f;
  --rule: rgba(34, 28, 20, 0.18);
  --rule-strong: rgba(34, 28, 20, 0.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

body {
  background:
    radial-gradient(ellipse at 20% 0%, rgba(226, 115, 31, 0.04), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(34, 28, 20, 0.05), transparent 60%),
    var(--cream);
}

/* Paper grain — subtle noise via repeating linear gradients */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.35;
  z-index: 1;
  background-image:
    repeating-linear-gradient(0deg, rgba(34,28,20,0.012) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(34,28,20,0.012) 0 1px, transparent 1px 3px);
  mix-blend-mode: multiply;
}

img, svg { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: 0; background: 0; color: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

.serif { font-family: 'Playfair Display', 'Times New Roman', serif; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

#root { position: relative; z-index: 2; }

/* ============================================================
   TICKER
   ============================================================ */
.ticker {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 0;
  background: var(--ink);
  color: var(--cream);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-bottom: 1px solid #000;
}
.ticker__label {
  background: var(--red);
  color: var(--cream);
  padding: 10px 18px;
  font-weight: 700;
  letter-spacing: 0.18em;
}
.ticker__track { overflow: hidden; padding: 10px 0; position: relative; }
.ticker__track::before, .ticker__track::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 2; pointer-events: none;
}
.ticker__track::before { left: 0; background: linear-gradient(90deg, var(--ink), transparent); }
.ticker__track::after { right: 0; background: linear-gradient(270deg, var(--ink), transparent); }
.ticker__inner {
  display: inline-flex;
  gap: 48px;
  white-space: nowrap;
  animation: scroll 90s linear infinite;
  padding-left: 48px;
}
.ticker__item { display: inline-flex; align-items: center; gap: 10px; }
.ticker__dot { width: 6px; height: 6px; background: var(--saffron); border-radius: 50%; display: inline-block; }
.ticker__date { padding: 10px 18px; opacity: 0.7; border-left: 1px solid rgba(255,255,255,0.15); }

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ============================================================
   NAV
   ============================================================ */
.nav {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 32px;
  padding: 18px 48px;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(244, 237, 224, 0.92);
  backdrop-filter: blur(8px);
}
.nav__logo { display: inline-flex; align-items: center; gap: 12px; }
.nav__mark {
  width: 40px; height: 40px; display: inline-grid; place-items: center;
  background: var(--ink); color: var(--saffron); border-radius: 50%;
  font-size: 18px;
  overflow: hidden;
  padding: 4px;
}
.nav__mark img { width: 100%; height: 100%; object-fit: contain; filter: brightness(0) invert(1) sepia(1) hue-rotate(-12deg) saturate(4); }
.nav__name {
  display: block;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 18px;
  line-height: 1;
  letter-spacing: -0.01em;
}
.nav__tag {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  opacity: 0.55;
  margin-top: 2px;
}
.nav__links {
  display: inline-flex;
  gap: 32px;
  justify-self: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.nav__links a { padding: 6px 0; border-bottom: 1px solid transparent; transition: border 0.2s; }
.nav__links a:hover { border-bottom-color: var(--ink); }
.nav__cta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: var(--saffron);
  color: var(--cream);
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  transition: background 0.2s;
}
.nav__cta:hover { background: var(--saffron-2); }

/* ============================================================
   HERO
   ============================================================ */
.hero {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 64px;
  padding: 72px 48px 80px;
  border-bottom: 1px solid var(--rule);
  align-items: center;
}
.hero__eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 28px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot--red { background: var(--red); box-shadow: 0 0 0 4px rgba(182, 42, 28, 0.18); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(182, 42, 28, 0.18); }
  50% { box-shadow: 0 0 0 7px rgba(182, 42, 28, 0.05); }
}

.hero__title {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: clamp(48px, 6.4vw, 92px);
  line-height: 0.96;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 28px;
}
.hero__title em {
  font-style: italic;
  font-weight: 500;
  color: var(--saffron);
}

.hero__lede {
  font-size: 19px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 580px;
  margin-bottom: 36px;
}
.hero__lede strong { font-weight: 700; color: var(--ink); }
.hero__lede em { font-family: 'Playfair Display', serif; font-style: italic; }

.hero__ctas { display: flex; gap: 14px; margin-bottom: 56px; }

.hero__meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  padding-top: 32px;
  border-top: 1px solid var(--rule);
}
.hero__meta-num {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 6px;
}
.hero__meta-lab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-2);
  line-height: 1.35;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 22px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 600;
  border-radius: 999px;
  transition: all 0.2s;
  border: 1px solid transparent;
  cursor: pointer;
}
.btn--primary { background: var(--saffron); color: #fff; }
.btn--primary:hover { background: var(--saffron-2); transform: translateY(-1px); }
.btn--primary:disabled { background: rgba(34,28,20,0.18); color: rgba(34,28,20,0.4); cursor: not-allowed; transform: none; }
.btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn--ghost:hover { background: var(--ink); color: var(--cream); }
.btn--ghost.btn--dark { color: var(--cream); border-color: var(--cream); }
.btn--ghost.btn--dark:hover { background: var(--cream); color: var(--ink); }
.btn--lg { padding: 18px 28px; font-size: 13px; }
.btn--block { display: flex; justify-content: center; width: 100%; }

/* ============================================================
   POSTER
   ============================================================ */
.poster {
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 28px 26px;
  position: relative;
  box-shadow:
    0 1px 0 rgba(34,28,20,0.05),
    16px 18px 0 -2px var(--cream-2),
    16px 18px 0 -1px var(--ink);
  transform: rotate(-1.2deg);
}
.poster::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1px solid var(--ink);
  pointer-events: none;
}
.poster__top {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
  margin-bottom: 18px;
}
.poster__row {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.poster__row--big {
  margin-top: 10px;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--saffron);
}

.poster__art {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 22px 0 18px;
  background:
    radial-gradient(circle at center 40%, rgba(226,115,31,0.10), transparent 60%),
    var(--paper);
  border-top: 1px dashed var(--rule);
  border-bottom: 1px dashed var(--rule);
  overflow: hidden;
}
.poster__art .poster__seal { width: 62%; aspect-ratio: 1; max-width: 280px; }
.poster__art .poster__rays { position: absolute; inset: 0; pointer-events: none; }
.poster__rays {
  position: absolute; inset: 0;
  background:
    repeating-conic-gradient(from 0deg at 50% 50%,
      rgba(34,28,20,0.08) 0deg 6deg,
      transparent 6deg 18deg);
  mask-image: radial-gradient(circle at center, transparent 24%, black 26%, black 70%, transparent 80%);
  -webkit-mask-image: radial-gradient(circle at center, transparent 24%, black 26%, black 70%, transparent 80%);
}
.poster__seal {
  position: relative; z-index: 2;
  width: 62%; aspect-ratio: 1;
  background: var(--cream);
  border-radius: 50%;
  display: grid; place-items: center;
  box-shadow:
    0 0 0 4px var(--paper),
    0 0 0 5px var(--ink),
    inset 0 0 0 1px rgba(34,28,20,0.15);
  overflow: hidden;
}
.poster__seal-inner {
  width: 78%; height: 78%;
  display: grid; place-items: center;
}
.poster__seal-tumbler {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 6px 0 rgba(34,28,20,0.08));
}
.poster__sym {
  margin-top: 14px;
  text-align: center;
  display: flex; flex-direction: column; gap: 4px;
  padding-bottom: 4px;
}
.poster__sym span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--ink-2);
}
.poster__sym strong {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 26px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.poster__sym em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--saffron);
  line-height: 1.3;
}

.poster__title {
  margin-top: 18px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  line-height: 1.02;
  letter-spacing: -0.01em;
}
.poster__title-line {
  display: block;
  font-size: 38px;
  font-weight: 800;
  color: var(--ink);
}
.poster__title-line--em em {
  font-style: italic;
  font-weight: 500;
  color: var(--saffron);
}

.poster__bottom {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 2px solid var(--ink);
  text-align: center;
}
.poster__quote {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 15px;
  line-height: 1.45;
  color: var(--ink-2);
}
.poster__sig {
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-2);
}
.poster__stamp {
  margin: 18px auto 4px;
  width: 130px; height: 130px;
  border: 2px solid var(--red);
  border-radius: 50%;
  display: grid; place-items: center;
  transform: rotate(-8deg);
  opacity: 0.78;
  color: var(--red);
  position: relative;
}
.poster__stamp::before {
  content: '';
  position: absolute; inset: 6px;
  border: 1px solid var(--red);
  border-radius: 50%;
}
.poster__stamp-ring span {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-align: center;
  width: 90px;
  line-height: 1.25;
  font-weight: 700;
}

/* ============================================================
   STATS
   ============================================================ */
.stats {
  background: var(--cocoa);
  color: var(--cream);
  padding: 64px 48px;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 64px;
  align-items: end;
}
.stats__eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--saffron);
  margin-bottom: 12px;
}
.stats__h {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.02em;
}
.stats__h em { font-weight: 500; color: var(--saffron); }
.stats__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-left: 1px solid rgba(255,255,255,0.12);
}
.stat {
  padding: 0 28px;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.stat:last-child { border-right: 0; }
.stat__value {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 64px;
  line-height: 1;
  color: var(--saffron);
  letter-spacing: -0.03em;
}
.stat__unit {
  font-size: 28px;
  margin-left: 4px;
  color: var(--cream);
  opacity: 0.7;
}
.stat__label {
  margin-top: 14px;
  font-size: 12px;
  line-height: 1.4;
  color: rgba(244, 237, 224, 0.7);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em;
}

/* ============================================================
   SECTION HEADS
   ============================================================ */
.section-head {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 28px;
  align-items: start;
  padding: 80px 48px 40px;
  border-bottom: 1px solid var(--rule);
  max-width: 1280px;
  margin: 0 auto;
}
.section-head--light { border-bottom-color: rgba(244,237,224,0.18); }
.section-head__no {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 64px;
  font-weight: 700;
  line-height: 0.9;
  color: var(--saffron);
}
.section-head__eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 10px;
}
.section-head__title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 4.4vw, 60px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
}
.section-head__title em { font-style: italic; font-weight: 500; color: var(--saffron); }

/* ============================================================
   MANIFESTO / DEMANDS
   ============================================================ */
.manifesto { padding-bottom: 80px; }
.demands {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px;
}
.demand {
  display: grid;
  grid-template-columns: 110px 1fr 60px;
  gap: 40px;
  padding: 40px 0;
  border-bottom: 1px solid var(--rule);
  align-items: start;
  position: relative;
}
.demand:last-child { border-bottom: 0; }
.demand__no {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 800;
  line-height: 0.9;
  color: var(--cream-2);
  letter-spacing: -0.04em;
}
.demand__title {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin-bottom: 8px;
}
.demand__sub {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--saffron);
  margin-bottom: 16px;
}
.demand__text {
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-2);
  max-width: 640px;
}
.demand__seal {
  width: 52px; height: 52px;
  display: grid; place-items: center;
  background: var(--ink);
  color: var(--saffron);
  border-radius: 50%;
  font-size: 22px;
  justify-self: end;
  transition: transform 0.4s;
}
.demand:hover .demand__seal { transform: rotate(72deg); }

/* ============================================================
   ELIGIBILITY (DARK SECTION)
   ============================================================ */
.eligibility {
  background: var(--cocoa);
  color: var(--cream);
  padding-bottom: 80px;
}
.eligibility .section-head__eyebrow { color: var(--saffron); }
.eligibility .section-head__no { color: var(--saffron); }
.elig {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 64px;
  align-items: start;
}
.elig__list { display: flex; flex-direction: column; gap: 0; }
.check {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 18px;
  padding: 22px 0;
  border-bottom: 1px solid rgba(244,237,224,0.12);
  align-items: center;
  cursor: pointer;
  transition: padding 0.2s;
}
.check input { display: none; }
.check:hover { padding-left: 8px; }
.check__box {
  width: 32px; height: 32px;
  border: 1.5px solid var(--cream);
  display: grid; place-items: center;
  font-size: 18px;
  color: var(--saffron);
  transition: all 0.2s;
}
.check--on .check__box { background: var(--saffron); color: var(--ink); border-color: var(--saffron); }
.check__text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  line-height: 1.3;
  transition: color 0.2s;
}
.check--on .check__text { color: var(--saffron); font-style: italic; }

.elig__verdict {
  background: var(--ink);
  border: 1px solid var(--saffron);
  padding: 32px;
  position: sticky;
  top: 100px;
}
.elig__counter { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; }
.elig__count {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 88px;
  line-height: 1;
  color: var(--saffron);
  letter-spacing: -0.04em;
}
.elig__count span { font-size: 36px; color: rgba(244,237,224,0.4); }
.elig__count-lab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(244,237,224,0.6);
}
.elig__bar {
  height: 4px;
  background: rgba(244,237,224,0.1);
  margin-bottom: 22px;
  overflow: hidden;
}
.elig__bar-fill {
  height: 100%;
  background: var(--saffron);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.elig__verdict-lab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(244,237,224,0.5);
  margin-bottom: 6px;
}
.elig__verdict-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  line-height: 1.25;
  color: var(--cream);
  margin-bottom: 28px;
  min-height: 70px;
}

/* ============================================================
   JOIN FORM
   ============================================================ */
.join { padding-bottom: 96px; }
.form {
  max-width: 1024px;
  margin: 0 auto;
  padding: 16px 48px 0;
}
.form__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;

function StatsBar() {
  return (
    <section className="stats">
      <div className="stats__lead">
        <div className="stats__eyebrow">— BY THE NUMBERS</div>
        <h3 className="stats__h">The state of the corporate <em>aam aadmi</em>.</h3>
      </div>
      <div className="stats__grid">
        {STATS.map((s, i) => (
          <div className="stat" key={i}>
            <div className="stat__value">
              {s.value}<span className="stat__unit">{s.unit}</span>
            </div>
            <div className="stat__label">{s.label}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Manifesto() {
  return (
    <section className="manifesto" id="manifesto">
      <div className="section-head">
        <div className="section-head__no">II.</div>
        <div>
          <div className="section-head__eyebrow">— THE MANIFESTO</div>
          <h2 className="section-head__title">
            Five demands, drafted between<br /><em>two unnecessary meetings.</em>
          </h2>
        </div>
      </div>

      <div className="demands">
        {DEMANDS.map((d) => (
          <article className="demand" key={d.no}>
            <div className="demand__no">{d.no}</div>
            <div className="demand__body">
              <h3 className="demand__title">{d.title}</h3>
              <div className="demand__sub"><em>{d.sub}</em></div>
              <p className="demand__text">{d.body}</p>
            </div>
            <div className="demand__seal">★</div>
          </article>
        ))}
      </div>
    </section>
  );
}

function Eligibility() {
  const [checked, setChecked] = useState({});
  const total = ELIGIBILITY.length;
  const count = Object.values(checked).filter(Boolean).length;
  const verdict =
    count === 0 ? "Awaiting your testimony" :
    count <= 2 ? "Probationary member" :
    count <= 4 ? "Card-carrying comrade" :
    count <= 5 ? "Senior cadre" :
    "FOUNDING MEMBER — Central Committee invitation incoming";

  return (
    <section className="eligibility" id="eligibility">
      <div className="section-head section-head--light">
        <div className="section-head__no">III.</div>
        <div>
          <div className="section-head__eyebrow">— ARE YOU ONE OF US?</div>
          <h2 className="section-head__title">
            The eligibility test. <em>No HR present.</em>
          </h2>
        </div>
      </div>

      <div className="elig">
        <div className="elig__list">
          {ELIGIBILITY.map((item, i) => (
            <label className={`check ${checked[i] ? "check--on" : ""}`} key={i}>
              <span className="check__box">{checked[i] ? "✓" : ""}</span>
              <input
                type="checkbox"
                checked={!!checked[i]}
                onChange={(e) => setChecked({ ...checked, [i]: e.target.checked })}
              />
              <span className="check__text">{item}</span>
            </label>
          ))}
        </div>

        <aside className="elig__verdict">
          <div className="elig__counter">
            <div className="elig__count">{count}<span>/{total}</span></div>
            <div className="elig__count-lab">SYMPTOMS DECLARED</div>
          </div>
          <div className="elig__bar">
            <div className="elig__bar-fill" style={{ width: `${(count / total) * 100}%` }} />
          </div>
          <div className="elig__verdict-lab">— PROVISIONAL VERDICT</div>
          <div className="elig__verdict-text"><em>{verdict}</em></div>
          <a href="#join" className="btn btn--primary btn--block">Claim your card →</a>
        </aside>
      </div>
    </section>
  );
}

function JoinForm() {
  const [form, setForm] = useState({

              <div className="card__no">No. CJP-{cardNo}</div>
              <div className="card__name">{form.name || "Comrade"}</div>
              <div className="card__role">
                {form.role || "Worker"}{form.company ? ` · ${form.company}` : ""}
              </div>
              <div className="card__quote">
                "I, a corporate <em>aam aadmi</em>, do solemnly swear to never accept<br />

              </div>
              <div className="card__bottom">

                  <div className="card__bottom-val">{form.grievance}</div>
                </div>
                <div>

                  <div className="card__bottom-val">{form.city || "Unaffiliated"}</div>

    <section className="join" id="join">
      <div className="section-head">
        <div className="section-head__no">IV.</div>
        <div>
          <div className="section-head__eyebrow">— MEMBERSHIP APPLICATION</div>
          <h2 className="section-head__title">
            Take the oath. Get the card.<br />
            <em>Make HR uncomfortable.</em>
          </h2>
        </div>
      </div>

      <form className="form" onSubmit={submit}>
        <div className="form__grid">
          <label className="field">
            <span className="field__label">Comrade Name *</span>
            <input
              type="text"
              placeholder="e.g. Rohan Iyer"
              value={form.name}
              onChange={(e) => setForm({ ...form, name: e.target.value })}
            />
          </label>
          <label className="field">
            <span className="field__label">Designation</span>
            <input
              type="text"
              placeholder="e.g. Senior Manager, Excel Forwarding"
              value={form.role}
              onChange={(e) => setForm({ ...form, role: e.target.value })}
            />
          </label>
          <label className="field">
            <span className="field__label">Place of Servitude</span>
            <input
              type="text"
              placeholder="e.g. A Consulting Firm You've Heard Of"
              value={form.company}
              onChange={(e) => setForm({ ...form, company: e.target.value })}
            />
          </label>
          <label className="field">
            <span className="field__label">City Chapter</span>
            <input
              type="text"
              placeholder="e.g. Bengaluru"
              value={form.city}
              onChange={(e) => setForm({ ...form, city: e.target.value })}
            />
          </label>
          <label className="field field--wide">
            <span className="field__label">Primary Grievance *</span>
            <select
              value={form.grievance}
              onChange={(e) => setForm({ ...form, grievance: e.target.value })}
            >
              {grievances.map((g, i) => (
                <option key={i} value={g} disabled={i === 0}>{g}</option>
              ))}
            </select>
          </label>
        </div>

        <label className="oath">
          <input
            type="checkbox"
            checked={form.oath}
            onChange={(e) => setForm({ ...form, oath: e.target.checked })}
          />
          <span className="oath__box">{form.oath ? "✓" : ""}</span>
          <span className="oath__text">
            I solemnly swear, on the holy book of Outlook, that I will <em>never</em>
            schedule a meeting that could have been an email, and I will mark <em>OOO</em>
            without apology.
          </span>
        </label>

        <button
          type="submit"
          className="btn btn--primary btn--lg"
          disabled={!form.name || !form.grievance || form.grievance === grievances[0] || !form.oath}
        >
          Issue my party card →
        </button>
      </form>
    </section>
  );
}

function FAQ() {
  const [open, setOpen] = useState(0);
  return (
    <section className="faq" id="faq">
      <div className="section-head section-head--light">
        <div className="section-head__no">V.</div>
        <div>
          <div className="section-head__eyebrow">— FREQUENTLY DODGED QUESTIONS</div>
          <h2 className="section-head__title">
            The press has questions.<br /><em>We have... responses.</em>
          </h2>
        </div>
      </div>
      <div className="faq__list">
